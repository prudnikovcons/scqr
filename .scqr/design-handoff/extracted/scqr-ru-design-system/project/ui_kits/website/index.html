<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>SCQR.RU — Главная</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="site.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="TopNav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="MiniFeed.jsx"></script>
<script type="text/babel" src="NewsletterBanner.jsx"></script>
<script type="text/babel" src="PopularSection.jsx"></script>
<script type="text/babel" src="EventsCard.jsx"></script>
<script type="text/babel" src="RubricsGrid.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
function App() {
  React.useEffect(() => { if (window.lucide) window.lucide.createIcons({ attrs: { width: 22, height: 22, "stroke-width": 2 } }); });
  return (
    <>
      <TopNav />
      <main className="container">
        <div className="hero-grid">
          <div>
            <HeroFeature />
            <HeroSubgrid />
          </div>
          <MiniFeed />
        </div>
        <NewsletterBanner />
        <section className="section">
          <div className="section-grid">
            <div>
              <div className="section-hdr">
                <h2><span className="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 3 14h7v8l10-12h-7z"/></svg></span> Популярное</h2>
              </div>
              <PopularSection />
            </div>
            <div>
              <div className="section-hdr"><h2 style={{ fontSize: 18 }}>&nbsp;</h2></div>
              <EventsCard />
            </div>
          </div>
        </section>
        <section className="section">
          <div className="section-grid">
            <div>
              <div className="section-hdr"><h2>Рубрики</h2><a>Все рубрики →</a></div>
              <RubricsGrid />
            </div>
            <div>
              <div className="section-hdr"><h2 style={{ fontSize: 18 }}>&nbsp;</h2></div>
              <PodcastCard />
            </div>
          </div>
        </section>
      </main>
      <Footer />
    </>
  );
}

setTimeout(() => {
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
}, 50);
</script>
</body>
</html>
