<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><title>Mascot showcase</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 16px; }
  .row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; align-items: end; }
  .tile { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 8px; text-align: center; }
  .tile img { width: 100%; height: 90px; object-fit: contain; }
  .tile .l { font-family: var(--font-mono); font-size: 10px; color: var(--ink-500); margin-top: 4px; }
</style></head>
<body>
<div class="row">
  <div class="tile"><img src="../assets/mascot/mascot-face.png" alt=""/><div class="l">avatar</div></div>
  <div class="tile"><img src="../assets/mascot/pose-thinking.png" alt=""/><div class="l">мыслит</div></div>
  <div class="tile"><img src="../assets/mascot/sticker-1.png" alt=""/><div class="l">ноутбук</div></div>
  <div class="tile"><img src="../assets/mascot/sticker-2.png" alt=""/><div class="l">👍</div></div>
  <div class="tile"><img src="../assets/mascot/sticker-3.png" alt=""/><div class="l">сердце</div></div>
  <div class="tile"><img src="../assets/mascot/sticker-4.png" alt=""/><div class="l">футболка</div></div>
  <div class="tile"><img src="../assets/mascot/sticker-6.png" alt=""/><div class="l">привет</div></div>
  <div class="tile"><img src="../assets/mascot/sticker-7.png" alt=""/><div class="l">ок</div></div>
</div>
</body></html>
