<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><title>Mono &amp; eyebrow</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .row { display: flex; flex-direction: column; gap: 16px; }
  .block { padding-bottom: 12px; border-bottom: 1px solid var(--line); }
  .block:last-child { border: 0; }
  .label { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-500); margin-bottom: 8px; }
  .stamp-row { display: flex; gap: 18px; align-items: baseline; }
  .stamp { font-family: var(--font-mono); font-weight: 500; color: var(--ink-700); font-size: 14px; }
  .eyebrow-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .eyebrow { font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
  .v { color: var(--violet-500); }
  .b { color: var(--blue-500); }
  .ink { color: var(--ink-500); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); margin-top: 6px; }
</style></head>
<body>
<div class="row">
  <div class="block">
    <div class="label">Timestamps · JetBrains Mono 500</div>
    <div class="stamp-row">
      <span class="stamp">12:42</span>
      <span class="stamp">11:31</span>
      <span class="stamp">10:15</span>
      <span class="stamp">09:47</span>
      <span class="stamp">Вчера, 23:12</span>
    </div>
    <div class="meta">JetBrains Mono · 13–14 / 500 · ink-500/700</div>
  </div>
  <div class="block">
    <div class="label">Eyebrow / rubric labels · Manrope 700 caps</div>
    <div class="eyebrow-row">
      <span class="eyebrow v">ГЛАВНОЕ</span>
      <span class="eyebrow ink">МОДЕЛИ</span>
      <span class="eyebrow ink">БИЗНЕС</span>
      <span class="eyebrow ink">ИССЛЕДОВАНИЯ</span>
      <span class="eyebrow ink">ОБУЧЕНИЕ</span>
      <span class="eyebrow ink">МНЕНИЕ</span>
    </div>
    <div class="meta">Manrope 700 · 12 · tracking 0.08em · uppercase</div>
  </div>
</div>
</body></html>
