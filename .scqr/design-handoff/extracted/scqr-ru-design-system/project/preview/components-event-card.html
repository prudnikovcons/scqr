<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><title>Event card</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px; }
  .list { display: flex; flex-direction: column; gap: 0; max-width: 480px; background: #fff; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .item { display: grid; grid-template-columns: 64px 1fr auto; gap: 14px; padding: 14px 16px; align-items: center; border-bottom: 1px solid var(--line); }
  .item:last-child { border: 0; }
  .date { width: 64px; height: 64px; border-radius: 10px; background: var(--violet-50); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .day { font-family: var(--font-display); font-weight: 800; font-size: 22px; color: var(--violet-600); line-height: 1; }
  .mon { font-family: var(--font-display); font-weight: 700; font-size: 11px; color: var(--violet-600); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }
  .title { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--ink-900); line-height: 1.25; }
  .loc { font-family: var(--font-body); font-size: 12px; color: var(--ink-500); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  .pill { background: var(--violet-50); color: var(--violet-600); font-family: var(--font-display); font-weight: 700; font-size: 11px; padding: 4px 10px; border-radius: 999px; }
</style></head>
<body>
<div class="list">
  <div class="item">
    <div class="date"><div class="day">27</div><div class="mon">мая</div></div>
    <div>
      <div class="title">Конференция AI Journey 2024</div>
      <div class="loc">📍 Москва, офлайн</div>
    </div>
    <span class="pill">Конференция</span>
  </div>
  <div class="item">
    <div class="date"><div class="day">03</div><div class="mon">июн</div></div>
    <div>
      <div class="title">Митап AI Makers Saint Petersburg</div>
      <div class="loc">📍 Санкт-Петербург</div>
    </div>
    <span class="pill">Митап</span>
  </div>
  <div class="item">
    <div class="date"><div class="day">10</div><div class="mon">июн</div></div>
    <div>
      <div class="title">Вебинар: Как внедрить ИИ в бизнес без боли</div>
      <div class="loc">📍 Онлайн</div>
    </div>
    <span class="pill">Вебинар</span>
  </div>
</div>
</body></html>
