<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><title>Top nav</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background: #FAFBFC; }
  .nav {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 24px;
  }
  .logo { font-family: var(--font-display); font-weight: 800; font-size: 20px; letter-spacing: -0.02em; color: var(--ink-900); }
  .logo .ru { color: var(--violet-500); }
  .tagline { font-family: var(--font-body); font-size: 12px; color: var(--ink-500); max-width: 130px; line-height: 1.25; }
  .links { display: flex; gap: 18px; margin-left: 16px; }
  .links a { font-family: var(--font-body); font-size: 14px; color: var(--ink-700); text-decoration: none; }
  .links a:first-child { color: var(--violet-600); font-weight: 600; }
  .right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .icon-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line); background: #fff; display:flex; align-items:center; justify-content:center; color: var(--ink-700); cursor: pointer; }
  .sub-btn {
    border: 1px solid var(--violet-500); background: #fff; color: var(--violet-600);
    border-radius: 999px; font-family: var(--font-display); font-weight: 700;
    font-size: 13px; padding: 8px 16px; cursor: pointer;
  }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: #fff; border: 1px solid var(--line); overflow: hidden; }
  .avatar img { width: 130%; height: auto; transform: translate(-12%, 6%); }
  .row2 { padding: 8px 24px 12px; display: flex; gap: 18px; border-bottom: 1px solid var(--line); background: #fff; }
  .row2 a { font-family: var(--font-display); font-weight: 600; font-size: 13px; color: var(--ink-900); text-decoration: none; }
  .row2 a:first-child { color: var(--violet-600); }
</style></head>
<body>
<div class="nav">
  <div style="display:flex; align-items:center; gap:12px;">
    <span class="logo">SCQ<span class="ru">R.RU</span></span>
    <span class="tagline">новости искусственного интеллекта</span>
  </div>
  <span class="right">
    <button class="icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
    <button class="sub-btn">Подписаться</button>
    <div class="avatar"><img src="../assets/mascot/mascot-face.png" alt=""/></div>
  </span>
</div>
<div class="row2">
  <a>Новости</a><a>Статьи</a><a>Обзоры</a><a>Инструменты</a><a>Конкурсы</a><a>События</a><a>Видео</a><a>Подкасты</a><a>Словарь</a>
</div>
</body></html>
