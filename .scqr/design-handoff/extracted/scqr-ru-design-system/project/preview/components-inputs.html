<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .row { display: flex; flex-direction: column; gap: 14px; }
  .group { display: flex; gap: 12px; align-items: center; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); width: 110px; }

  .input {
    font-family: var(--font-body);
    font-size: 14px;
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    color: var(--ink-900);
    width: 280px;
    transition: border-color 120ms, box-shadow 120ms;
  }
  .input::placeholder { color: var(--ink-400); }
  .input.focus { border-color: var(--violet-500); box-shadow: 0 0 0 3px rgba(108,77,255,0.20); outline: none; }

  .search {
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--line); border-radius: 999px;
    padding: 8px 14px; width: 320px; background: #fff;
  }
  .search input { border: 0; outline: 0; flex: 1; font-family: var(--font-body); font-size: 14px; background: transparent; }
  .search svg { color: var(--ink-500); flex-shrink: 0; }

  .news {
    display: flex; align-items: stretch; border: 1px solid var(--line);
    border-radius: 8px; overflow: hidden; background: #fff; width: 380px;
  }
  .news input { border: 0; outline: 0; flex: 1; padding: 10px 14px; font-family: var(--font-body); font-size: 14px; background: transparent; }
  .news button {
    background: var(--violet-500); color: #fff; border: 0;
    font-family: var(--font-display); font-weight: 700; font-size: 13px;
    padding: 0 18px; cursor: pointer;
  }
</style></head>
<body>
<div class="row">
  <div class="group">
    <span class="label">Default</span>
    <input class="input" placeholder="Введите e-mail" />
  </div>
  <div class="group">
    <span class="label">Focus</span>
    <input class="input focus" value="reader@example.ru" />
  </div>
  <div class="group">
    <span class="label">Search</span>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input placeholder="Поиск по новостям и статьям" />
    </div>
  </div>
  <div class="group">
    <span class="label">Newsletter</span>
    <div class="news">
      <input placeholder="ваш@email.ru" />
      <button>Подписаться</button>
    </div>
  </div>
</div>
</body></html>
