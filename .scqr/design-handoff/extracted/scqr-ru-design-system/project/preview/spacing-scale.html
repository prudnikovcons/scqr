<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 24px; }
  .row { display: flex; flex-direction: column; gap: 8px; }
  .item { display: grid; grid-template-columns: 90px 1fr 60px; align-items: center; gap: 14px; }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--ink-900); }
  .bar { height: 10px; border-radius: 3px; background: var(--violet-500); }
  .bar.b { background: var(--blue-500); opacity: 0.85; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); text-align: right; }
</style></head>
<body>
<div class="row">
  <div class="item"><span class="name">sp-1</span>  <div class="bar"   style="width:4px;"></div>  <span class="px">4 px</span></div>
  <div class="item"><span class="name">sp-2</span>  <div class="bar"   style="width:8px;"></div>  <span class="px">8 px</span></div>
  <div class="item"><span class="name">sp-3</span>  <div class="bar"   style="width:12px;"></div> <span class="px">12 px</span></div>
  <div class="item"><span class="name">sp-4</span>  <div class="bar"   style="width:16px;"></div> <span class="px">16 px</span></div>
  <div class="item"><span class="name">sp-5</span>  <div class="bar b" style="width:20px;"></div> <span class="px">20 px</span></div>
  <div class="item"><span class="name">sp-6</span>  <div class="bar b" style="width:24px;"></div> <span class="px">24 px</span></div>
  <div class="item"><span class="name">sp-8</span>  <div class="bar b" style="width:32px;"></div> <span class="px">32 px</span></div>
  <div class="item"><span class="name">sp-10</span> <div class="bar b" style="width:40px;"></div> <span class="px">40 px</span></div>
  <div class="item"><span class="name">sp-12</span> <div class="bar b" style="width:48px;"></div> <span class="px">48 px</span></div>
  <div class="item"><span class="name">sp-16</span> <div class="bar b" style="width:64px;"></div> <span class="px">64 px</span></div>
</div>
</body></html>
