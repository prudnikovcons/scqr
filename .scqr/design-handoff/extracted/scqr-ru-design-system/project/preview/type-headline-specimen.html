<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><title>Headline specimen</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .pill {
    display: inline-block;
    background: var(--violet-500); color: #fff;
    font-family: var(--font-display); font-weight: 700;
    font-size: 11px; letter-spacing: 0.08em;
    padding: 5px 10px; border-radius: 999px;
    margin-bottom: 14px;
  }
  h1.spec {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 36px;
    line-height: 1.18;
    letter-spacing: -0.022em;
    color: var(--ink-900);
    margin: 0 0 10px;
    text-wrap: balance;
    max-width: 600px;
  }
  p.spec {
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    color: var(--ink-700);
    margin: 0 0 12px;
    max-width: 540px;
    text-wrap: pretty;
  }
  .meta { font-family: var(--font-body); font-size: 13px; color: var(--ink-500); display:flex; gap:14px; align-items:center; }
  .dot { width:3px; height:3px; border-radius:50%; background: var(--ink-400); }
</style></head>
<body>
  <span class="pill">ГЛАВНОЕ</span>
  <h1 class="spec">OpenAI представила GPT-4o — новую эру естественного общения с ИИ</h1>
  <p class="spec">Модель понимает текст, изображения и звук одновременно. Общение стало быстрее, естественнее и контекстнее.</p>
  <div class="meta">
    <span>16 мая 2024</span>
    <span class="dot"></span>
    <span>12 684 просмотра</span>
    <span class="dot"></span>
    <span>4 мин чтения</span>
  </div>
</body></html>
