<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(5,1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 100%; height: 80px; background: var(--violet-50); border: 1px solid var(--violet-100); }
  .name { font-family: var(--font-display); font-weight: 700; font-size: 12px; color: var(--ink-900); }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); }
  .role { font-size: 11px; color: var(--ink-500); text-align: center; }
</style></head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:4px;"></div><div class="name">r-1</div><div class="px">4 px</div><div class="role">tags inline</div></div>
  <div class="item"><div class="box" style="border-radius:6px;"></div><div class="name">r-2</div><div class="px">6 px</div><div class="role">small chips</div></div>
  <div class="item"><div class="box" style="border-radius:8px;"></div><div class="name">r-3</div><div class="px">8 px</div><div class="role">cards, inputs</div></div>
  <div class="item"><div class="box" style="border-radius:12px;"></div><div class="name">r-4</div><div class="px">12 px</div><div class="role">feature blocks</div></div>
  <div class="item"><div class="box" style="border-radius:999px;"></div><div class="name">r-pill</div><div class="px">999 px</div><div class="role">pills, buttons</div></div>
</div>
</body></html>
