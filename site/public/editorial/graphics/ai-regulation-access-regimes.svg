<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="860" rx="28" fill="#FBFAF6"/>
  <rect x="36" y="36" width="1328" height="788" rx="24" stroke="#D9DBD1" stroke-width="2"/>
  <text x="82" y="120" fill="#141510" font-size="44" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Как выглядит режим допуска на рынке ИИ</text>
  <text x="82" y="160" fill="#6E7268" font-size="22" font-family="Arial, sans-serif">Вместо простой логики запрета — разные контуры разрешённого развёртывания</text>
  
  <rect x="100" y="250" width="360" height="360" rx="22" fill="#F4F0E6" stroke="#D9DBD1"/>
  <rect x="520" y="250" width="360" height="360" rx="22" fill="#F8F9F5" stroke="#D9DBD1"/>
  <rect x="940" y="250" width="360" height="360" rx="22" fill="#141510"/>
  <text x="146" y="316" fill="#141510" font-size="28" font-family="Arial, sans-serif" font-weight="700">Открытый контур</text>
  <text x="146" y="358" fill="#555A50" font-size="22" font-family="Arial, sans-serif">Тесты, исследования,</text>
  <text x="146" y="390" fill="#555A50" font-size="22" font-family="Arial, sans-serif">обычное коммерческое применение</text>
  <text x="146" y="452" fill="#141510" font-size="22" font-family="Arial, sans-serif">• базовая отчётность</text>
  <text x="146" y="486" fill="#141510" font-size="22" font-family="Arial, sans-serif">• стандартная безопасность</text>
  <text x="146" y="520" fill="#141510" font-size="22" font-family="Arial, sans-serif">• типовой договорный режим</text>
  <text x="564" y="316" fill="#141510" font-size="28" font-family="Arial, sans-serif" font-weight="700">Усиленный контур</text>
  <text x="564" y="358" fill="#555A50" font-size="22" font-family="Arial, sans-serif">Крупные корпоративные</text>
  <text x="564" y="390" fill="#555A50" font-size="22" font-family="Arial, sans-serif">и отраслевые внедрения</text>
  <text x="564" y="452" fill="#141510" font-size="22" font-family="Arial, sans-serif">• наблюдаемость</text>
  <text x="564" y="486" fill="#141510" font-size="22" font-family="Arial, sans-serif">• аудит данных и действий</text>
  <text x="564" y="520" fill="#141510" font-size="22" font-family="Arial, sans-serif">• специальные правила доступа</text>
  <text x="984" y="316" fill="#F6F5F1" font-size="28" font-family="Arial, sans-serif" font-weight="700">Критический контур</text>
  <text x="984" y="358" fill="#C8C9C1" font-size="22" font-family="Arial, sans-serif">Госзаказ, чувствительные</text>
  <text x="984" y="390" fill="#C8C9C1" font-size="22" font-family="Arial, sans-serif">данные, особые зоны доверия</text>
  <text x="984" y="452" fill="#F6F5F1" font-size="22" font-family="Arial, sans-serif">• отдельная инфраструктура</text>
  <text x="984" y="486" fill="#F6F5F1" font-size="22" font-family="Arial, sans-serif">• повышенный контроль модели</text>
  <text x="984" y="520" fill="#F6F5F1" font-size="22" font-family="Arial, sans-serif">• расширенная ответственность</text>

</svg>