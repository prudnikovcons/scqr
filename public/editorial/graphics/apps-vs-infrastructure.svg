<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="860" rx="28" fill="#FBFAF6"/>
  <rect x="36" y="36" width="1328" height="788" rx="24" stroke="#D9DBD1" stroke-width="2"/>
  <text x="82" y="120" fill="#141510" font-size="44" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Приложения против инфраструктуры</text>
  <text x="82" y="160" fill="#6E7268" font-size="22" font-family="Arial, sans-serif">Два разных ритма рынка ИИ</text>
  
  <rect x="100" y="250" width="520" height="440" rx="22" fill="#F7F8F3" stroke="#D9DBD1"/>
  <rect x="780" y="250" width="520" height="440" rx="22" fill="#141510"/>
  <text x="148" y="318" fill="#141510" font-size="30" font-family="Arial, sans-serif" font-weight="700">Рынок приложений</text>
  <text x="148" y="374" fill="#555A50" font-size="22" font-family="Arial, sans-serif">• быстрый выход на рынок</text>
  <text x="148" y="408" fill="#555A50" font-size="22" font-family="Arial, sans-serif">• высокая заметность бренда</text>
  <text x="148" y="442" fill="#555A50" font-size="22" font-family="Arial, sans-serif">• меньше капитальной тяжести</text>
  <text x="148" y="476" fill="#555A50" font-size="22" font-family="Arial, sans-serif">• слабее контроль над дефицитом</text>
  <text x="148" y="548" fill="#141510" font-size="24" font-family="Arial, sans-serif" font-weight="700">Выигрыш</text>
  <text x="148" y="584" fill="#141510" font-size="22" font-family="Arial, sans-serif">Скорость, внимание, дистрибуция</text>
  <text x="824" y="318" fill="#F6F5F1" font-size="30" font-family="Arial, sans-serif" font-weight="700">Рынок инфраструктуры</text>
  <text x="824" y="374" fill="#C8C9C1" font-size="22" font-family="Arial, sans-serif">• длинная стройка и тяжёлый капвложение</text>
  <text x="824" y="408" fill="#C8C9C1" font-size="22" font-family="Arial, sans-serif">• контроль над мощностями</text>
  <text x="824" y="442" fill="#C8C9C1" font-size="22" font-family="Arial, sans-serif">• фильтр допуска к масштабу</text>
  <text x="824" y="476" fill="#C8C9C1" font-size="22" font-family="Arial, sans-serif">• медленнее, но стратегически жёстче</text>
  <text x="824" y="548" fill="#F6F5F1" font-size="24" font-family="Arial, sans-serif" font-weight="700">Выигрыш</text>
  <text x="824" y="584" fill="#F6F5F1" font-size="22" font-family="Arial, sans-serif">Власть, дефицит, долговременная рента</text>

</svg>