  <text x="82" y="120" fill="#141510" font-size="44" font-family="Georgia, 'Times New Roman', serif" font-weight="700">Российский рынок ИИ: витрина, спрос, внедрение</text>
  <text x="82" y="160" fill="#6E7268" font-size="22" font-family="Arial, sans-serif">Три слоя, которые часто смешивают в один</text>
  
  <rect x="110" y="250" width="320" height="360" rx="22" fill="#F4F0E6" stroke="#D9DBD1"/>
