  <text x="156" y="366" fill="#555A50" font-size="22" font-family="Arial, sans-serif">Платформы, презентации,</text>
  <text x="156" y="398" fill="#555A50" font-size="22" font-family="Arial, sans-serif">стратегии, отчёты о росте</text>
  <text x="586" y="320" fill="#141510" font-size="28" font-family="Arial, sans-serif" font-weight="700">Пилоты</text>
  <text x="586" y="366" fill="#555A50" font-size="22" font-family="Arial, sans-serif">Точечные внедрения,</text>
  <text x="586" y="398" fill="#555A50" font-size="22" font-family="Arial, sans-serif">ручная поддержка, эксперименты</text>
  <text x="1016" y="320" fill="#141510" font-size="28" font-family="Arial, sans-serif" font-weight="700">Повторяемый спрос</text>
  <text x="1016" y="366" fill="#141510" font-size="22" font-family="Arial, sans-serif">Платящий заказчик,</text>
  <text x="1016" y="398" fill="#141510" font-size="22" font-family="Arial, sans-serif">экономика внедрения, масштаб</text>
