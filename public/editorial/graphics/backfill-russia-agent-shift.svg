<?xml version="1.0" encoding="UTF-8"?>
<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" rx="28" fill="#FBFAF6"/>
  <rect x="40" y="40" width="1360" height="820" rx="26" fill="#FBFAF6" stroke="#D7D2C4" stroke-width="2"/>
  <rect x="72" y="72" width="1296" height="176" rx="22" fill="#141510"/>
  <text x="110" y="144" fill="#F6F5F1" font-size="46" font-family="Arial, sans-serif" font-weight="700">Российский сдвиг: от витрины к рабочим агентам</text>
  <text x="110" y="194" fill="#C8C9C1" font-size="24" font-family="Arial, sans-serif">Ключевой вопрос уже не в наличии модели, а в повторяемом сценарии</text>
  <path d="M1120 110C1198 72 1292 82 1342 144C1384 198 1376 282 1324 330" stroke="#C6F24B" stroke-width="3" stroke-linecap="round"/>
  <circle cx="1298" cy="154" r="18" fill="#C6F24B"/>

  <rect x="140" y="278" width="320" height="380" rx="24" fill="#F4F0E6" stroke="#D9DBD1"/>
  <rect x="560" y="218" width="320" height="440" rx="24" fill="#F8F9F5" stroke="#D9DBD1"/>
  <rect x="980" y="150" width="320" height="508" rx="24" fill="#C6F24B" stroke="#A9D632"/>
  <text x="188" y="346" fill="#141510" font-size="30" font-family="Arial, sans-serif" font-weight="700">Витрина</text>
  <text x="188" y="396" fill="#555A50" font-size="22" font-family="Arial, sans-serif">релизы, демо,</text>
  <text x="188" y="426" fill="#555A50" font-size="22" font-family="Arial, sans-serif">отчёты о росте</text>
  <text x="608" y="286" fill="#141510" font-size="30" font-family="Arial, sans-serif" font-weight="700">Пилот</text>
  <text x="608" y="336" fill="#555A50" font-size="22" font-family="Arial, sans-serif">внутренний помощник,</text>
  <text x="608" y="366" fill="#555A50" font-size="22" font-family="Arial, sans-serif">ручной контроль</text>
  <text x="608" y="396" fill="#555A50" font-size="22" font-family="Arial, sans-serif">ограниченный контур</text>
  <text x="1028" y="218" fill="#141510" font-size="30" font-family="Arial, sans-serif" font-weight="700">Рабочий слой</text>
  <text x="1028" y="268" fill="#141510" font-size="22" font-family="Arial, sans-serif">поддержка, HR, финансы,</text>
  <text x="1028" y="298" fill="#141510" font-size="22" font-family="Arial, sans-serif">поиск по знаниям, аналитика</text>
  <text x="1028" y="352" fill="#141510" font-size="22" font-family="Arial, sans-serif">главный дефицит:</text>
  <text x="1028" y="382" fill="#141510" font-size="22" font-family="Arial, sans-serif">безопасный контур и</text>
  <text x="1028" y="412" fill="#141510" font-size="22" font-family="Arial, sans-serif">встроенность в процессы</text>
  <path d="M460 470H560" stroke="#A9D632" stroke-width="8" stroke-linecap="round"/>
  <path d="M880 470H980" stroke="#A9D632" stroke-width="8" stroke-linecap="round"/>
  <text x="174" y="724" fill="#555A50" font-size="22" font-family="Arial, sans-serif">Переход к третьему слою и определяет, будет ли российский рынок жить на презентациях или на контракте.</text>

